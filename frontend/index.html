<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetaVAE Face Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="app-container">
    <header class="header">
      <h1>BetaVAE Visualizer</h1>
      <p>Explore the 16-dimensional latent space</p>
    </header>

    <main class="main-content">
      <aside class="controls-panel">
        <div class="controls-header">
          <h2>Latent Dimensions</h2>
          <div class="btn-group">
            <button id="randomize-btn" class="btn"
              style="margin-right: 0.5rem; background-color: rgba(59, 130, 246, 0.2);">Randomize</button>
            <button id="reset-btn" class="btn">Reset All</button>
          </div>
        </div>
        <div id="sliders-container" class="sliders-grid">
          <!-- Sliders generated by JS -->
        </div>
      </aside>

      <section class="viewport">
        <div class="glass-panel">
          <div id="loading-overlay" class="overlay active">
            <div class="spinner"></div>
            <p>Loading Model...</p>
          </div>
          <canvas id="output-canvas" width="48" height="48"></canvas>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
