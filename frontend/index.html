<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BetaVAE Face Generator</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div class="app-container">
    <header class="header">
      <h1>BetaVAE Visualizer</h1>
      <p>Explore & Reconstruct the 16-dimensional latent space</p>
    </header>

    <main class="main-content">
      <aside class="controls-panel">
        <div class="tabs-nav">
          <button id="tab-sliders" class="tab-btn active">Manual Sliders</button>
          <button id="tab-encoder" class="tab-btn">Image Encoder</button>
        </div>

        <!-- Sliders Tab Pane -->
        <div id="pane-sliders" class="tab-pane active">
          <div class="controls-header">
            <h2>Latent Dimensions</h2>
            <div class="btn-group">
              <button id="randomize-btn" class="btn randomize-btn">Randomize</button>
              <button id="reset-btn" class="btn reset-btn">Reset All</button>
            </div>
          </div>
          <div id="sliders-container" class="sliders-groups-container">
            <!-- Sliders grouped in collapsible categories by JS -->
          </div>
        </div>

        <!-- Encoder Tab Pane -->
        <div id="pane-encoder" class="tab-pane">
          <div class="controls-header">
            <h2>Image Encoder</h2>
            <p class="pane-subtitle">Upload any face image to map it back to the 16-D latent space.</p>
          </div>
          <div class="upload-area" id="upload-area">
            <div class="upload-icon">
              <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </div>
            <p>Drag & drop face image or <strong>browse files</strong></p>
            <input type="file" id="image-loader" accept="image/*" />
          </div>
          <div id="encoder-feedback" class="encoder-feedback-msg" style="display: none;"></div>
        </div>
      </aside>

      <section class="viewport">
        <div class="comparison-container">
          <div class="viewport-box reconstruction-box">
            <span class="box-label">VAE Reconstruction</span>
            <div class="glass-panel">
              <div id="loading-overlay" class="overlay active">
                <div class="spinner"></div>
                <p>Loading Models...</p>
              </div>
              <canvas id="output-canvas" width="64" height="64"></canvas>
            </div>
          </div>
          
          <div class="viewport-box input-box">
            <span class="box-label">Original Input</span>
            <div class="glass-panel">
              <div id="input-placeholder" class="image-placeholder">
                <p>No Image Uploaded</p>
              </div>
              <img id="input-preview" class="input-preview-image" style="display: none;" alt="Original face input" />
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script type="module" src="/main.js"></script>
</body>

</html>
